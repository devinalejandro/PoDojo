  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- ears -->
  <circle cx="168" cy="156" r="46" fill="url(#fur)" stroke="#1a0f04" stroke-width="10"/>
  <circle cx="344" cy="156" r="46" fill="url(#fur)" stroke="#1a0f04" stroke-width="10"/>
  <circle cx="168" cy="160" r="20" fill="#ff9aa0"/>
  <circle cx="344" cy="160" r="20" fill="#ff9aa0"/>
  <!-- head -->
  <rect x="146" y="150" width="220" height="210" rx="86" fill="url(#fur)" stroke="#1a0f04" stroke-width="12"/>
