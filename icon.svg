  <circle cx="300" cy="248" r="20" fill="#0a2a14"/>
  <circle cx="218" cy="242" r="6" fill="#fff"/>
  <circle cx="306" cy="242" r="6" fill="#fff"/>
  <!-- nose + mouth -->
