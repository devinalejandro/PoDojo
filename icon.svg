  <ellipse cx="256" cy="300" rx="78" ry="58" fill="#ffe9c8"/>
  <!-- stripes -->
  <rect x="196" y="168" width="14" height="52" rx="7" fill="#1a0f04"/>
  <rect x="302" y="168" width="14" height="52" rx="7" fill="#1a0f04"/>
  <rect x="160" y="214" width="40" height="13" rx="6" fill="#1a0f04"/>
