# Static site — the dashboard lives at the repo root, no build step.
[build]
  publish = "."
  command = ""

# Proxy rules also declared here (belt-and-suspenders with _redirects).
[[redirects]]
  from = "/api/status"
  to = "http://24.144.111.138:8001/api/status"
  status = 200
  force = true

[[redirects]]
  from = "/api/op/*"
  to = "http://24.144.111.138:8002/api/op/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/chat-api/*"
  to = "http://24.144.111.138:8003/api/:splat"
  status = 200
  force = true
